function teamsOf(id){
  const m=M[id], c=confOf(id);
  if(c) return {home:c.home||"", away:c.away||"", locked:true};
  if(m.round==="R32"){
    return {home: qualOf(m.a) || state.r32[m.a] || "", away: qualOf(m.b) || state.r32[m.b] || "", locked:false};
  }
  const pick = m.loser ? loserTeam : winnerTeam;
  return {home: pick(m.a), away: pick(m.b), locked:false};
}
function winSide(id){
  const c=confOf(id);
  if(c){
    if(c.winner==="home"||c.winner==="away") return c.winner;
    if(typeof c.hg==="number" && typeof c.ag==="number" && c.hg!==c.ag) return c.hg>c.ag?"home":"away";
    return null;
  }
  return state.picks[id] || null;
}
function winnerTeam(id){ const t=teamsOf(id), s=winSide(id); return s==="home"?t.home : s==="away"?t.away : ""; }
function loserTeam(id){  const t=teamsOf(id), s=winSide(id); return s==="home"?t.away  : s==="away"?t.home  : ""; }

/* ---------------- Herkunfts-Texte ---------------- */
function provText(feeder, loser){
  if(M[feeder]){
    const r = M[feeder].round;
    const lbl = r==="R32"?"Sechzehntelf.":r==="R16"?"Achtelf.":r==="QF"?"Viertelf.":r==="SF"?"Halbf.":"";
    return (loser?"Verlierer Spiel ":"Sieger Spiel ") + M[feeder].no + (lbl?(" В· "+lbl):"");
  }
  const pos=feeder[0], grp=feeder.slice(1);
  if(pos==="1") return "Sieger Gruppe "+grp;
  if(pos==="2") return "Zweiter Gruppe "+grp;
  if(pos==="3") return "Bester Dritter (Gr. "+grp.split("").join("/")+")";
  return feeder;
}

/* ---------------- Auswahlliste ---------------- */
let TEAM_OPTIONS = "";
(function(){
  const byGroup={};
  for(const [code,[name,flag,grp]] of Object.entries(TEAMS)){ (byGroup[grp]=byGroup[grp]||[]).push([code,name,flag]); }
  let html='<option value="">вЂ” Team wГ¤hlen вЂ”</option>';
  for(const g of "ABCDEFGHIJKL"){
    html+=`<optgroup label="Gruppe ${g}">`;
    byGroup[g].sort((a,b)=>a[1].localeCompare(b[1],"de"));
    for(const [code,name,flag] of byGroup[g]) html+=`<option value="${code}">${flag} ${name}</option>`;
    html+='</optgroup>';
  }
  TEAM_OPTIONS=html;
})();

/* ---------------- Rendering ---------------- */
const bracketEl=document.getElementById("bracket");

function scoreOf(id, side){
  const c=confOf(id);
  if(c) return side==="home"?c.hg:c.ag;
  return state.scores[id] ? state.scores[id][side] : undefined;
}

function teamRow(id, side, team, win, locked){
  const known=!!team, d=team?TEAMS[team]:null;
  const flag=d?d[1]:"", name=d?d[0]:"вЂ”";
  const sv=scoreOf(id, side);
  const clickable = known && !locked;
  const mark = win ? (locked?'рџ”’':'вњ“') : '';
  return `<div class="team static ${clickable?'clickable':'disabled'} ${win?'winner':''}" data-id="${id}" data-side="${side}">
      <span class="flag ${known?'':'empty'}" style="--tc:${tc(team)}">${flag}</span>
      <span class="name ${known?'':'empty'}">${name}</span>
      <input class="score" type="number" min="0" inputmode="numeric" data-id="${id}" data-side="${side}" value="${sv??''}" ${locked||!known?'disabled':''}>
      <span class="chk">${mark}</span>
    </div>`;
}

function matchCard(id){
  const m=M[id], t=teamsOf(id), c=confOf(id), w=winSide(id);
  const isR32 = m.round==="R32";

  function slot(side, feeder, team){
    const qualified = qualOf(feeder);
    const confirmedHere = !!c;
    const prov = `<div class="prov">${provText(feeder, !!m.loser)}</div>`;
    if(isR32 && !qualified && !confirmedHere){
      const sv=scoreOf(id, side), chosen=!!team, win=(w===side);
      return `<div class="team editable ${win?'winner':''}">
          <select class="sel" data-code="${feeder}">${TEAM_OPTIONS}</select>
          <input class="score" type="number" min="0" inputmode="numeric" data-id="${id}" data-side="${side}" value="${sv??''}" ${chosen?'':'disabled'}>
          <button class="pick-btn ${win?'on':''}" data-id="${id}" data-side="${side}" ${chosen?'':'disabled'} title="Kommt weiter">в–¶</button>
        </div>${prov}`;
    }
    const locked = confirmedHere || (isR32 && !!qualified);
    return teamRow(id, side, team, w===side, locked) + prov;
  }
  return `<div class="match ${c?"confirmed":""}" data-match="${id}">
     <div class="mhead"><span class="city">${m.city}</span><span class="no">Spiel ${m.no}</span></div>
     <div class="mdate">${m.date}</div>
     ${slot("home", m.a, t.home)}
     ${slot("away", m.b, t.away)}
   </div>`;
}

function render(){
  const badge=document.getElementById("standBadge");
  const nResults=Object.keys(R.results).length, nQual=Object.keys(R.qualified).length;
  if(R.updated){
    badge.className="badge live";
    badge.innerHTML=`рџџў Stand: <b>${R.updated}</b> В· ${nResults} Ergebnis(se), ${nQual} qualifiziert В· Quelle: ${R.source||"вЂ“"}`;
  }else{
    badge.className="badge";
    badge.innerHTML="вљЄ Noch keine offiziellen Ergebnisse вЂ“ alle Felder sind Tipp-Felder";
  }

  let html="";
  for(const col of COLS){
    const cls = col.key==="SF" ? "gold-near" : "";
    html+=`<div class="round"><div class="round-title">${col.title}</div><div class="round-wrap">`;
    for(const id of col.ids) html+=matchCard(id);
    html+=`</div></div>`;
  }
  const champ = winnerTeam("FIN");
  const champTxt = champ ? `<div class="crown">рџЏ† ${TEAMS[champ][1]} ${TEAMS[champ][0]}</div>` : "";
  html+=`<div class="round final-col">
      <div class="fin-wrap">
        <div class="round-title gold">Finale</div>
        <div class="match final-card" data-match="FIN">
          <div class="mhead"><span class="city">${M.FIN.city}</span><span class="no">Spiel ${M.FIN.no}</span></div>
          <div class="mdate">${M.FIN.date}</div>
          ${finalSlot("home","HF1")}
          ${finalSlot("away","HF2")}
        </div>
        <div class="champion">${champTxt}</div>
      </div>
      <div class="fin-wrap">
        <div class="round-title bronze">Spiel um Platz 3</div>
        <div class="match p3-card" data-match="P3">
          <div class="mhead"><span class="city">${M.P3.city}</span><span class="no">Spiel ${M.P3.no}</span></div>
          <div class="mdate">${M.P3.date}</div>
          ${p3Slot("home","HF1")}
          ${p3Slot("away","HF2")}
        </div>
      </div>
    </div>`;
  bracketEl.innerHTML=html;
  bracketEl.querySelectorAll("select.sel").forEach(s=>{
    const code=s.dataset.code;
    s.value = qualOf(code) || state.r32[code] || "";
  });
  requestAnimationFrame(drawConnectors);
}

function finalSlot(side, feeder){
  const t=teamsOf("FIN"), c=confOf("FIN"), w=winSide("FIN");
  const team = side==="home"?t.home:t.away;
  return teamRow("FIN", side, team, w===side, !!c)+`<div class="prov">${provText(feeder,false)}</div>`;
}
function p3Slot(side, feeder){
  const t=teamsOf("P3"), c=confOf("P3"), w=winSide("P3");
  const team = side==="home"?t.home:t.away;
  return teamRow("P3", side, team, w===side, !!c)+`<div class="prov">${provText(feeder,true)}</div>`;
}

/* ---------------- Verbindungslinien ---------------- */
const SVGNS="http://www.w3.org/2000/svg";
function relPoint(el, edge){
  const r=el.getBoundingClientRect(), b=bracketEl.getBoundingClientRect();
  return { x:(edge==="left"?r.left:r.right)-b.left, y:r.top-b.top+r.height/2 };
}
function elbowPath(x1,y1,x2,y2){
  if(Math.abs(y1-y2)<1) return `M${x1},${y1} L${x2},${y2}`;
  const midX=(x1+x2)/2;
  const dir=y2>y1?1:-1;
  const r=Math.min(11, Math.abs(y2-y1)/2, Math.abs(midX-x1)-1, Math.abs(x2-midX)-1, 11);
  const rr=Math.max(0,r);
  return `M${x1},${y1} L${midX-rr},${y1} Q${midX},${y1} ${midX},${y1+dir*rr} L${midX},${y2-dir*rr} Q${midX},${y2} ${midX+rr},${y2} L${x2},${y2}`;
}
function drawConnectors(){
  const old=bracketEl.querySelector(".conn-svg");
  if(old) old.remove();
  const w=bracketEl.scrollWidth, h=bracketEl.scrollHeight;
  const svg=document.createElementNS(SVGNS,"svg");
  svg.setAttribute("class","conn-svg");
  svg.setAttribute("width",w); svg.setAttribute("height",h);
  svg.setAttribute("viewBox",`0 0 ${w} ${h}`);

  const links=[];
  for(const [id,m] of Object.entries(M)){
    if(m.round==="R32") continue;
    [["a","home"],["b","away"]].forEach(([key,side])=>{
      const feeder=m[key];
      if(!M[feeder]) return;
      links.push({feeder, target:id, side, loser:!!m.loser});
    });
  }
  // erst Verlierer/Standard, dann aktive Sieger oben drauf
  const draw=(lk)=>{
    const fEl=bracketEl.querySelector(`.match[data-match="${lk.feeder}"]`);
    const tEl=bracketEl.querySelector(`.match[data-match="${lk.target}"] .team[data-side="${lk.side}"]`);
    const tCard=bracketEl.querySelector(`.match[data-match="${lk.target}"]`);
    if(!fEl||!tCard) return;
    const ws=winSide(lk.feeder);
    // Austritt: an der Sieger-/Verlierer-Zeile, sonst Kartenmitte
    let fy;
    const exitSide = lk.loser ? (ws==="home"?"away":ws==="away"?"home":null) : ws;
    const exRow = exitSide ? fEl.querySelector(`.team[data-side="${exitSide}"]`) : null;
    const fp = exRow ? relPoint(exRow,"right") : relPoint(fEl,"right");
    const tp = tEl ? relPoint(tEl,"left") : relPoint(tCard,"left");
    const active = !!ws; // Sieger des Zubringers steht fest
    const p=document.createElementNS(SVGNS,"path");
    p.setAttribute("d", elbowPath(fp.x, fp.y, tp.x, tp.y));
    p.setAttribute("fill","none");
    let cls="conn";
    if(lk.loser) cls+=" lose"+(active?" lose-on":"");
    else cls+= active?" win-on":"";
    p.setAttribute("class",cls);
    p.dataset.feeder=lk.feeder; p.dataset.target=lk.target;
    svg.appendChild(p);
  };
  links.filter(l=>l.loser || !winSide(l.feeder)).forEach(draw);
  links.filter(l=>!l.loser && winSide(l.feeder)).forEach(draw);

  bracketEl.insertBefore(svg, bracketEl.firstChild);
}

/* Hover: Linien einer Karte hervorheben */
bracketEl.addEventListener("mouseover", e=>{
  const card=e.target.closest(".match"); if(!card) return;
  const id=card.dataset.match; if(!id) return;
  bracketEl.querySelectorAll(".conn-svg path").forEach(p=>{
    if(p.dataset.feeder===id||p.dataset.target===id) p.classList.add("hl");
  });
});
bracketEl.addEventListener("mouseout", e=>{
  const card=e.target.closest(".match"); if(!card) return;
  bracketEl.querySelectorAll(".conn-svg path.hl").forEach(p=>p.classList.remove("hl"));
});

/* ---------------- Interaktion ---------------- */
function togglePick(id, side){
  if(confOf(id)) return;
  const t=teamsOf(id);
  if(!(side==="home"?t.home:t.away)) return;
  state.picks[id] = (state.picks[id]===side) ? null : side;
  if(!state.picks[id]) delete state.picks[id];
  save(); render();
}
bracketEl.addEventListener("click", e=>{
  if(e.target.classList.contains("score") || e.target.classList.contains("sel")) return;
  const btn=e.target.closest(".pick-btn");
  if(btn){ if(!btn.disabled) togglePick(btn.dataset.id, btn.dataset.side); return; }
  const row=e.target.closest(".team.static.clickable");
  if(row) togglePick(row.dataset.id, row.dataset.side);
});

bracketEl.addEventListener("change", e=>{
  if(e.target.classList.contains("sel")){
    const code=e.target.dataset.code, val=e.target.value;
    if(val) state.r32[code]=val; else delete state.r32[code];
    save(); render();
  }
});

bracketEl.addEventListener("input", e=>{
  if(e.target.classList.contains("score")){
    const id=e.target.dataset.id, side=e.target.dataset.side;
    if(confOf(id)) return;
    const v=e.target.value;
    state.scores[id]=state.scores[id]||{};
    if(v==="") delete state.scores[id][side]; else state.scores[id][side]=Number(v);
    const s=state.scores[id];
    if(s && typeof s.home==="number" && typeof s.away==="number" && s.home!==s.away){
      state.picks[id]= s.home>s.away?"home":"away";
    }
    save(); render();
  }
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Alle eigenen Tipps lГ¶schen? (BestГ¤tigte Ergebnisse bleiben erhalten.)")){
    state={r32:{},picks:{},scores:{}}; save(); render();
  }
});

document.getElementById("introHint").innerHTML =
  "<b>So funktioniert's:</b> Trage im <b>Sechzehntelfinale</b> die 32 Mannschaften Гјber die Auswahllisten ein "+
  "(unter jedem Feld steht, welcher Platz vorgesehen ist). Mit einem <b>Klick auf eine Mannschaft</b> bestimmst du, "+
  "wer weiterkommt вЂ“ die <b>Linien</b> zeigen den Weg bis ins Finale und die nГ¤chste Runde fГјllt sich automatisch. "+
  "Tore kannst du optional eintragen. Sobald ein Spiel offiziell entschieden ist, trГ¤gt der Aktualisierungs-Task das "+
  "echte Ergebnis ein: es Гјberschreibt deinen Tipp und sperrt das Feld (<span class='k'>рџ”’</span>).";

/* Redraw bei Resize & nach Font-Load */
let rT;
window.addEventListener("resize", ()=>{ clearTimeout(rT); rT=setTimeout(drawConnectors,120); });
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>drawConnectors()); }
window.addEventListener("load", ()=>setTimeout(drawConnectors,150));

render();
</script>
