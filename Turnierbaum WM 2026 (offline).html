  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 : s===\"away\"?t.home  : \"\"; }\n\n/* ---------------- Herkunfts-Texte ---------------- */\nfunction provText(feeder, loser){\n  if(M[feeder]){\n    const r = M[feeder].round;\n    const lbl = r===\"R32\"?\"Sechzehntelf.\":r===\"R16\"?\"Achtelf.\":r===\"QF\"?\"Viertelf.\":r===\"SF\"?\"Halbf.\":\"\";\n    return (loser?\"Verlierer Spiel \":\"Sieger Spiel \") + M[feeder].no + (lbl?(\" · \"+lbl):\"\");\n  }\n  const pos=feeder[0], grp=feeder.slice(1);\n  if(pos===\"1\") return \"Sieger Gruppe \"+grp;\n  if(pos===\"2\") return \"Zweiter Gruppe \"+grp;\n  if(pos===\"3\") return \"Bester Dritter (Gr. \"+grp.split(\"\").join(\"/\")+\")\";\n  return feeder;\n}\n\n/* ---------------- Auswahlliste ---------------- */\nlet TEAM_OPTIONS = \"\";\n(function(){\n  const byGroup={};\n  for(const [code,[name,flag,grp]] of Object.entries(TEAMS)){ (byGroup[grp]=byGroup[grp]||[]).push([code,name,flag]); }\n  let html='<option value=\"\">— Team wählen —<\u002Foption>';\n  for(const g of \"ABCDEFGHIJKL\"){\n    html+=`<optgroup label=\"Gruppe ${g}\">`;\n    byGroup[g].sort((a,b)=>a[1].localeCompare(b[1],\"de\"));\n    for(const [code,name,flag] of byGroup[g]) html+=`<option value=\"${code}\">${flag} ${name}<\u002Foption>`;\n    html+='<\u002Foptgroup>';\n  }\n  TEAM_OPTIONS=html;\n})();\n\n/* ---------------- Rendering ---------------- */\nconst bracketEl=document.getElementById(\"bracket\");\n\nfunction scoreOf(id, side){\n  const c=confOf(id);\n  if(c) return side===\"home\"?c.hg:c.ag;\n  return state.scores[id] ? state.scores[id][side] : undefined;\n}\n\nfunction teamRow(id, side, team, win, locked){\n  const known=!!team, d=team?TEAMS[team]:null;\n  const flag=d?d[1]:\"\", name=d?d[0]:\"—\";\n  const sv=scoreOf(id, side);\n  const clickable = known && !locked;\n  const mark = win ? (locked?'🔒':'✓') : '';\n  return `<div class=\"team static ${clickable?'clickable':'disabled'} ${win?'winner':''}\" data-id=\"${id}\" data-side=\"${side}\">\n      <span class=\"flag ${known?'':'empty'}\" style=\"--tc:${tc(team)}\">${flag}<\u002Fspan>\n      <span class=\"name ${known?'':'empty'}\">${name}<\u002Fspan>\n      <input class=\"score\" type=\"number\" min=\"0\" inputmode=\"numeric\" data-id=\"${id}\" data-side=\"${side}\" value=\"${sv??''}\" ${locked||!known?'disabled':''}>\n      <span class=\"chk\">${mark}<\u002Fspan>\n    <\u002Fdiv>`;\n}\n\nfunction matchCard(id){\n  const m=M[id], t=teamsOf(id), c=confOf(id), w=winSide(id);\n  const isR32 = m.round===\"R32\";\n\n  function slot(side, feeder, team){\n    const qualified = qualOf(feeder);\n    const confirmedHere = !!c;\n    const prov = `<div class=\"prov\">${provText(feeder, !!m.loser)}<\u002Fdiv>`;\n    if(isR32 && !qualified && !confirmedHere){\n      const sv=scoreOf(id, side), chosen=!!team, win=(w===side);\n      return `<div class=\"team editable ${win?'winner':''}\">\n          <select class=\"sel\" data-code=\"${feeder}\">${TEAM_OPTIONS}<\u002Fselect>\n          <input class=\"score\" type=\"number\" min=\"0\" inputmode=\"numeric\" data-id=\"${id}\" data-side=\"${side}\" value=\"${sv??''}\" ${chosen?'':'disabled'}>\n          <button class=\"pick-btn ${win?'on':''}\" data-id=\"${id}\" data-side=\"${side}\" ${chosen?'':'disabled'} title=\"Kommt weiter\">▶<\u002Fbutton>\n        <\u002Fdiv>${prov}`;\n    }\n    const locked = confirmedHere || (isR32 && !!qualified);\n    return teamRow(id, side, team, w===side, locked) + prov;\n  }\n  return `<div class=\"match ${c?\"confirmed\":\"\"}\" data-match=\"${id}\">\n     <div class=\"mhead\"><span class=\"city\">${m.city}<\u002Fspan><span class=\"no\">Spiel ${m.no}<\u002Fspan><\u002Fdiv>\n     <div class=\"mdate\">${m.date}<\u002Fdiv>\n     ${slot(\"home\", m.a, t.home)}\n     ${slot(\"away\", m.b, t.away)}\n   <\u002Fdiv>`;\n}\n\nfunction render(){\n  const badge=document.getElementById(\"standBadge\");\n  const nResults=Object.keys(R.results).length, nQual=Object.keys(R.qualified).length;\n  if(R.updated){\n    badge.className=\"badge live\";\n    badge.innerHTML=`🟢 Stand: <b>${R.updated}<\u002Fb> · ${nResults} Ergebnis(se), ${nQual} qualifiziert · Quelle: ${R.source||\"–\"}`;\n  }else{\n    badge.className=\"badge\";\n    badge.innerHTML=\"⚪ Noch keine offiziellen Ergebnisse – alle Felder sind Tipp-Felder\";\n  }\n\n  let html=\"\";\n  for(const col of COLS){\n    const cls = col.key===\"SF\" ? \"gold-near\" : \"\";\n    html+=`<div class=\"round\"><div class=\"round-title\">${col.title}<\u002Fdiv><div class=\"round-wrap\">`;\n    for(const id of col.ids) html+=matchCard(id);\n    html+=`<\u002Fdiv><\u002Fdiv>`;\n  }\n  const champ = winnerTeam(\"FIN\");\n  const champTxt = champ ? `<div class=\"crown\">🏆 ${TEAMS[champ][1]} ${TEAMS[champ][0]}<\u002Fdiv>` : \"\";\n  html+=`<div class=\"round final-col\">\n      <div class=\"fin-wrap\">\n        <div class=\"round-title gold\">Finale<\u002Fdiv>\n        <div class=\"match final-card\" data-match=\"FIN\">\n          <div class=\"mhead\"><span class=\"city\">${M.FIN.city}<\u002Fspan><span class=\"no\">Spiel ${M.FIN.no}<\u002Fspan><\u002Fdiv>\n          <div class=\"mdate\">${M.FIN.date}<\u002Fdiv>\n          ${finalSlot(\"home\",\"HF1\")}\n          ${finalSlot(\"away\",\"HF2\")}\n        <\u002Fdiv>\n        <div class=\"champion\">${champTxt}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fin-wrap\">\n        <div class=\"round-title bronze\">Spiel um Platz 3<\u002Fdiv>\n        <div class=\"match p3-card\" data-match=\"P3\">\n          <div class=\"mhead\"><span class=\"city\">${M.P3.city}<\u002Fspan><span class=\"no\">Spiel ${M.P3.no}<\u002Fspan><\u002Fdiv>\n          <div class=\"mdate\">${M.P3.date}<\u002Fdiv>\n          ${p3Slot(\"home\",\"HF1\")}\n          ${p3Slot(\"away\",\"HF2\")}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  bracketEl.innerHTML=html;\n  bracketEl.querySelectorAll(\"select.sel\").forEach(s=>{\n    const code=s.dataset.code;\n    s.value = qualOf(code) || state.r32[code] || \"\";\n  });\n  requestAnimationFrame(drawConnectors);\n}\n\nfunction finalSlot(side, feeder){\n  const t=teamsOf(\"FIN\"), c=confOf(\"FIN\"), w=winSide(\"FIN\");\n  const team = side===\"home\"?t.home:t.away;\n  return teamRow(\"FIN\", side, team, w===side, !!c)+`<div class=\"prov\">${provText(feeder,false)}<\u002Fdiv>`;\n}\nfunction p3Slot(side, feeder){\n  const t=teamsOf(\"P3\"), c=confOf(\"P3\"), w=winSide(\"P3\");\n  const team = side===\"home\"?t.home:t.away;\n  return teamRow(\"P3\", side, team, w===side, !!c)+`<div class=\"prov\">${provText(feeder,true)}<\u002Fdiv>`;\n}\n\n/* ---------------- Verbindungslinien ---------------- */\nconst SVGNS=\"http://www.w3.org/2000/svg\";\nfunction relPoint(el, edge){\n  const r=el.getBoundingClientRect(), b=bracketEl.getBoundingClientRect();\n  return { x:(edge===\"left\"?r.left:r.right)-b.left, y:r.top-b.top+r.height/2 };\n}\nfunction elbowPath(x1,y1,x2,y2){\n  if(Math.abs(y1-y2)<1) return `M${x1},${y1} L${x2},${y2}`;\n  const midX=(x1+x2)/2;\n  const dir=y2>y1?1:-1;\n  const r=Math.min(11, Math.abs(y2-y1)/2, Math.abs(midX-x1)-1, Math.abs(x2-midX)-1, 11);\n  const rr=Math.max(0,r);\n  return `M${x1},${y1} L${midX-rr},${y1} Q${midX},${y1} ${midX},${y1+dir*rr} L${midX},${y2-dir*rr} Q${midX},${y2} ${midX+rr},${y2} L${x2},${y2}`;\n}\nfunction drawConnectors(){\n  const old=bracketEl.querySelector(\".conn-svg\");\n  if(old) old.remove();\n  const w=bracketEl.scrollWidth, h=bracketEl.scrollHeight;\n  const svg=document.createElementNS(SVGNS,\"svg\");\n  svg.setAttribute(\"class\",\"conn-svg\");\n  svg.setAttribute(\"width\",w); svg.setAttribute(\"height\",h);\n  svg.setAttribute(\"viewBox\",`0 0 ${w} ${h}`);\n\n  const links=[];\n  for(const [id,m] of Object.entries(M)){\n    if(m.round===\"R32\") continue;\n    [[\"a\",\"home\"],[\"b\",\"away\"]].forEach(([key,side])=>{\n      const feeder=m[key];\n      if(!M[feeder]) return;\n      links.push({feeder, target:id, side, loser:!!m.loser});\n    });\n  }\n  // erst Verlierer/Standard, dann aktive Sieger oben drauf\n  const draw=(lk)=>{\n    const fEl=bracketEl.querySelector(`.match[data-match=\"${lk.feeder}\"]`);\n    const tEl=bracketEl.querySelector(`.match[data-match=\"${lk.target}\"] .team[data-side=\"${lk.side}\"]`);\n    const tCard=bracketEl.querySelector(`.match[data-match=\"${lk.target}\"]`);\n    if(!fEl||!tCard) return;\n    const ws=winSide(lk.feeder);\n    // Austritt: an der Sieger-/Verlierer-Zeile, sonst Kartenmitte\n    let fy;\n    const exitSide = lk.loser ? (ws===\"home\"?\"away\":ws===\"away\"?\"home\":null) : ws;\n    const exRow = exitSide ? fEl.querySelector(`.team[data-side=\"${exitSide}\"]`) : null;\n    const fp = exRow ? relPoint(exRow,\"right\") : relPoint(fEl,\"right\");\n    const tp = tEl ? relPoint(tEl,\"left\") : relPoint(tCard,\"left\");\n    const active = !!ws; // Sieger des Zubringers steht fest\n    const p=document.createElementNS(SVGNS,\"path\");\n    p.setAttribute(\"d\", elbowPath(fp.x, fp.y, tp.x, tp.y));\n    p.setAttribute(\"fill\",\"none\");\n    let cls=\"conn\";\n    if(lk.loser) cls+=\" lose\"+(active?\" lose-on\":\"\");\n    else cls+= active?\" win-on\":\"\";\n    p.setAttribute(\"class\",cls);\n    p.dataset.feeder=lk.feeder; p.dataset.target=lk.target;\n    svg.appendChild(p);\n  };\n  links.filter(l=>l.loser || !winSide(l.feeder)).forEach(draw);\n  links.filter(l=>!l.loser && winSide(l.feeder)).forEach(draw);\n\n  bracketEl.insertBefore(svg, bracketEl.firstChild);\n}\n\n/* Hover: Linien einer Karte hervorheben */\nbracketEl.addEventListener(\"mouseover\", e=>{\n  const card=e.target.closest(\".match\"); if(!card) return;\n  const id=card.dataset.match; if(!id) return;\n  bracketEl.querySelectorAll(\".conn-svg path\").forEach(p=>{\n    if(p.dataset.feeder===id||p.dataset.target===id) p.classList.add(\"hl\");\n  });\n});\nbracketEl.addEventListener(\"mouseout\", e=>{\n  const card=e.target.closest(\".match\"); if(!card) return;\n  bracketEl.querySelectorAll(\".conn-svg path.hl\").forEach(p=>p.classList.remove(\"hl\"));\n});\n\n/* ---------------- Interaktion ---------------- */\nfunction togglePick(id, side){\n  if(confOf(id)) return;\n  const t=teamsOf(id);\n  if(!(side===\"home\"?t.home:t.away)) return;\n  state.picks[id] = (state.picks[id]===side) ? null : side;\n  if(!state.picks[id]) delete state.picks[id];\n  save(); render();\n}\nbracketEl.addEventListener(\"click\", e=>{\n  if(e.target.classList.contains(\"score\") || e.target.classList.contains(\"sel\")) return;\n  const btn=e.target.closest(\".pick-btn\");\n  if(btn){ if(!btn.disabled) togglePick(btn.dataset.id, btn.dataset.side); return; }\n  const row=e.target.closest(\".team.static.clickable\");\n  if(row) togglePick(row.dataset.id, row.dataset.side);\n});\n\nbracketEl.addEventListener(\"change\", e=>{\n  if(e.target.classList.contains(\"sel\")){\n    const code=e.target.dataset.code, val=e.target.value;\n    if(val) state.r32[code]=val; else delete state.r32[code];\n    save(); render();\n  }\n});\n\nbracketEl.addEventListener(\"input\", e=>{\n  if(e.target.classList.contains(\"score\")){\n    const id=e.target.dataset.id, side=e.target.dataset.side;\n    if(confOf(id)) return;\n    const v=e.target.value;\n    state.scores[id]=state.scores[id]||{};\n    if(v===\"\") delete state.scores[id][side]; else state.scores[id][side]=Number(v);\n    const s=state.scores[id];\n    if(s && typeof s.home===\"number\" && typeof s.away===\"number\" && s.home!==s.away){\n      state.picks[id]= s.home>s.away?\"home\":\"away\";\n    }\n    save(); render();\n  }\n});\n\ndocument.getElementById(\"resetBtn\").addEventListener(\"click\", ()=>{\n  if(confirm(\"Alle eigenen Tipps löschen? (Bestätigte Ergebnisse bleiben erhalten.)\")){\n    state={r32:{},picks:{},scores:{}}; save(); render();\n  }\n});\n\ndocument.getElementById(\"introHint\").innerHTML =\n  \"<b>So funktioniert's:<\u002Fb> Trage im <b>Sechzehntelfinale<\u002Fb> die 32 Mannschaften über die Auswahllisten ein \"+\n  \"(unter jedem Feld steht, welcher Platz vorgesehen ist). Mit einem <b>Klick auf eine Mannschaft<\u002Fb> bestimmst du, \"+\n  \"wer weiterkommt – die <b>Linien<\u002Fb> zeigen den Weg bis ins Finale und die nächste Runde füllt sich automatisch. \"+\n  \"Tore kannst du optional eintragen. Sobald ein Spiel offiziell entschieden ist, trägt der Aktualisierungs-Task das \"+\n  \"echte Ergebnis ein: es überschreibt deinen Tipp und sperrt das Feld (<span class='k'>🔒<\u002Fspan>).\";\n\n/* Redraw bei Resize & nach Font-Load */\nlet rT;\nwindow.addEventListener(\"resize\", ()=>{ clearTimeout(rT); rT=setTimeout(drawConnectors,120); });\nif(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>drawConnectors()); }\nwindow.addEventListener(\"load\", ()=>setTimeout(drawConnectors,150));\n\nrender();\n<\u002Fscript>\n<style>\n  /* Verbindungslinien-Stile */\n  .conn{stroke:var(--line-2); stroke-width:2; opacity:.85}\n  .conn.win-on{stroke:var(--leaf); stroke-width:2.6; opacity:1}\n  .conn.lose{stroke:var(--line-2); stroke-width:2; stroke-dasharray:4 4; opacity:.7}\n  .conn.lose-on{stroke:var(--bronze); opacity:.95}\n  .conn.hl{stroke:var(--berry); stroke-width:3; opacity:1; stroke-dasharray:none}\n<\u002Fstyle>\n\n\n<\u002Fbody><\u002Fhtml>"
